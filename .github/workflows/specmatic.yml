name: Specmatic Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Start FastAPI Server
        run: |
          cd backend
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          sleep 15

      - name: Verify Server
        run: |
          curl http://localhost:8000/docs
          curl http://localhost:8000/actuator/mappings

      - name: Run Specmatic Tests (Contract + Schema Resiliency)
        run: |
          docker run --rm \
            --network host \
            --add-host=host.docker.internal:host-gateway \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            specmatic/specmatic:latest \
            test \
            --config specmatic.yaml \
            --testBaseURL=http://host.docker.internal:8000 \
            --junitReportDir=build/reports/specmatic \
            openapi/expense-sharing-api.yaml

      - name: Upload Specmatic Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-report
          path: build/reports/specmatic
