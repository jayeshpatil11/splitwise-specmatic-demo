name: Specmatic Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Start FastAPI Server
        run: |
          cd backend
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          sleep 60

      - name: Verify API
        run: |
          echo "Checking Docs..."
          curl -f http://localhost:8000/docs

          echo "Checking OpenAPI..."
          curl -f http://localhost:8000/openapi.json

          echo "Checking Expenses..."
          curl -f http://localhost:8000/expenses

          echo "Checking Actuator..."
          curl -f http://localhost:8000/actuator/mappings

          echo ""
          echo "All endpoints are reachable."

      - name: Show Server Log
        if: always()
        run: |
          cat backend/server.log

      - name: Verify Actuator From Docker
        run: |
          docker run --rm \
            --network host \
            curlimages/curl \
            curl -f http://localhost:8000/actuator/mappings

      - name: Run Specmatic Tests
        run: |
          docker run --rm \
            --network host \
            -e TEST_BASE_URL=http://localhost:8000 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            specmatic/specmatic:latest \
            test \
            --config specmatic.yaml \
            --junitReportDir=build/reports/specmatic

      - name: Upload Specmatic Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-report
          path: build/reports/specmatic
