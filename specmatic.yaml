version: 3

components:
  sources:
    localContracts:
      filesystem:
        directory: .

  runOptions:
    expenseSharingTest:
      openapi:
        type: test
        baseUrl: "{TEST_BASE_URL:http://host.docker.internal:8000}"
        actuatorUrl: "{TEST_BASE_URL:http://host.docker.internal:8000}/actuator/mappings"

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/localContracts"
          specs:
            - openapi/expense-sharing-api.yaml

    runOptions:
      $ref: "#/components/runOptions/expenseSharingTest"

specmatic:
  settings:
    test:
      schemaResiliencyTests: all

  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic

    successCriteria:
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
