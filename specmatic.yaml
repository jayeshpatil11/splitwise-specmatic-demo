version: 3

components:
  sources:
    localContracts:
      filesystem:
        directory: .

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            $ref: "#/components/sources/localContracts"
          specs:
            - openapi/expense-sharing-api.yaml

specmatic:
  settings:
    test:
      schemaResiliencyTests: all

  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic

    successCriteria:
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
